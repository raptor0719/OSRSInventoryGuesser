<html>
	<head>
		<title>OSRS Inventory Guesser</title>
		<script src="third-party/jquery-3.7.1.min.js"></script>
		<script src="utilities.js"></script>
		<script src="items-metadata.js"></script>
		<script src="items-alternatives-metadata.js"></script>
		<script src="developer-matches-metadata.js"></script>
		<script src="inventory-guesser.js"></script>
		<script src="string-fuzzy-matcher.js"></script>
		<link rel="stylesheet" href="inventory-guesser.css"></link>
		<script>
		$(function() {
			let displayContainer = $("#display-container");
			let answerKey = $("#answer-key");
			let alternativesContainer = $("#alternatives-container");
			let matchCodeField = $("#match-code-container > span");

			let markHovered = function(displayContainer, answerKey, on, index) {
				if (on) {
					$(displayContainer.children()[index]).addClass("hovered");
					$(answerKey.children()[index]).addClass("hovered");
				} else {
					$(displayContainer.children()[index]).removeClass("hovered");
					$(answerKey.children()[index]).removeClass("hovered");
				}
			}

			let getItemNames = function(item) {
				return item[VARIANT_NAMES_PROP];
			}
			let getItemIconFileName = function(item) {
				return item[VARIANT_ICON_FILE_PROP];
			}

			let swapAlternatives = function(button, index, originalName, alternativeNamesList) {
				if (button.hasClass("showing")) {
					answerKey.find("button").removeClass("showing");
					alternativesContainer.empty();
					return;
				}
				
				answerKey.find("button").removeClass("showing");
				button.addClass("showing");

				alternativesContainer.empty();
				alternativesContainer.append($("<h1></h1>").attr("inventory-index", index).text("Alternatives for " + originalName));

				alternativeNamesList.forEach(function(name) {
					alternativesContainer.append($("<a></a>")
								.attr("href", Util.createOSRSWikiSearchURL(name))
								.attr("target", "_blank")
								.text(name));
				});
			}

			let createAnswerKeyEntry = function(item, index) {
				let name = getItemNames(item)[0];
				let answerKeyEntry = $("<span></span>")
							.append($("<a></a>")
								.attr("href", Util.createOSRSWikiSearchURL(name))
								.attr("target", "_blank")
								.text(name))
							.hover(markHovered.bind(null, displayContainer, answerKey, true, index),
								markHovered.bind(null, displayContainer, answerKey, false, index));
				let iconFileName = getItemIconFileName(item);
				if (Util.hasAlternatives(iconFileName) && inventoryGuesser.isAllowAlternatives()) {
					let alternativeNames = Util.findAllAlternativeNames(iconFileName);
					let showAltsButton = $("<button>?</button>");
					showAltsButton.click(swapAlternatives.bind(null, showAltsButton, index, name, alternativeNames));
					answerKeyEntry.append(showAltsButton);
				}
				return answerKeyEntry;
			}
			let swapForAlternative = function(answerKey, indexMatched, itemVariant) {
				let alternativeAnswerKeyEntry = createAnswerKeyEntry(itemVariant, indexMatched)
				answerKey.children()[indexMatched].replaceWith(alternativeAnswerKeyEntry[0])
			}
			
			// Populate developer matches
			let developerMatchesSelect = $("#developer-matches-select");
			let developerMatchesButton = $("#new-developer-match-button");
			for (const [name, match] of Object.entries(DeveloperMatchesMetadata)) {
				let matchOption = $("<option></option>")
					.attr("value", name)
					.text(name);
				developerMatchesSelect.append(matchOption);
			}

			var inventoryGuesser = new InventoryGuesser(getItemNames, getItemIconFileName, swapForAlternative.bind(null, answerKey), ItemsMetadata);

			$("#guess").on("input", function() {
				if (!inventoryGuesser.allHasMatched()) {
					let guess = $(this).val();

					if (guess.trim().length <= 0) {
						return;
					}

					let matchedIndicies = inventoryGuesser.guess(guess);
					let displayedIcons = displayContainer.children();
					let answerText = answerKey.children();
					matchedIndicies.forEach(function(i) {
						$(displayedIcons[i]).addClass("correct");
						$(answerText[i]).addClass("guessed");
					});
					if (matchedIndicies.length > 0) {
						$(this).val("");
					}
				}
			});

			$("#give-up-button").click(function() {
				let unmatchedIndices = inventoryGuesser.endGame();
				let displayedIcons = displayContainer.children();
				let answerText = answerKey.children();

				unmatchedIndices.forEach(function(i) {
						$(displayedIcons[i]).addClass("not-guessed");
						$(answerText[i]).addClass("not-guessed");
				});
			});

			let matchFactorInput = $("#match-factor");
			let numberOfItemsInput = $("#number-of-items");
			let allowAlternativesInput = $("#allow-alternatives");
			let allowDuplicatesInput = $("#allow-duplicates");
			let allowMultiMatchInput = $("#allow-multi-match");
			let matchCodeInput = $("#match-code-field");
			let useCustomSettings = $("#use-custom-settings");

			matchFactorInput.on("input", function() {
				$("#match-factor-val").text($(this).val());
			}).trigger("input");
			
			let startNewGame = function(numberOfItems, allowAlternatives, allowDuplicates, allowMultiMatch, matchFactor, predefinedItems) {
				console.log("Starting new game with properties:\nmatchFactor = " + matchFactor + "\nnumber of items = " + numberOfItems + "\nallow alternatives = " + allowAlternatives + "\nallow duplicates = " + allowDuplicates + "\nallow multi-match = " + allowMultiMatch + "\npredefined items = " + predefinedItems.length);
				
				// Set settings to reflect the current match
				numberOfItemsInput.val(numberOfItems);
				allowAlternativesInput.prop("checked", allowAlternatives);
				allowDuplicatesInput.prop("checked", allowDuplicates);
				allowMultiMatchInput.prop("checked", allowMultiMatch);
				matchFactorInput.val(matchFactor*100).trigger("input");
				matchCodeInput.val("");
				
				let stringMatcher = new StringFuzzyMatcher(matchFactor);

				let items = inventoryGuesser.newGame(numberOfItems, allowAlternatives, allowDuplicates, allowMultiMatch, stringMatcher, predefinedItems);
				console.log(items.map((x) => x.names));

				displayContainer.empty();
				answerKey.empty();
				alternativesContainer.empty();

				let scaleFactor = 1.8;
				let maxIconPixelSize = 50;
				items.forEach(function(e, i, arr) {
					$("<img></img>")
						.prop("src", getItemIconFileName(e))
						.appendTo(displayContainer)
						.one("load", function() {
							Util.resizeImgElement($(this), scaleFactor, maxIconPixelSize);
						})
						.hover(markHovered.bind(null, displayContainer, answerKey, true, i),
								markHovered.bind(null, displayContainer, answerKey, false, i));
					createAnswerKeyEntry(e, i).appendTo(answerKey);
				});
				matchCodeField.text(inventoryGuesser.getMatchCode());
			}
			
			developerMatchesButton.click(function() {
				let matchName = developerMatchesSelect.val();
				
				if (matchName !== null) {
					let matchData = DeveloperMatchesMetadata[matchName];
					
					let matchFactor = matchData["match_factor"];
					let numberOfItems = matchData["item_variants"].length;
					let allowAlternatives = matchData["allow_alternative"];
					let allowDuplicates = matchData["allow_repeats"];
					let allowMultiMatch = matchData["allow_multimatch"];
					let predefinedItems = matchData["item_variants"];
					
					startNewGame(numberOfItems, allowAlternatives, allowDuplicates, allowMultiMatch, matchFactor, predefinedItems);
				}
			});

			$("#new-game-button").click(function() {
				let matchCodeData = (matchCodeInput.val().trim() !== "") ? Util.parseMatchCode(matchCodeInput.val().trim()) : null;
				let fromMatchCode = !useCustomSettings.prop("checked") && matchCodeData !== null;

				let matchFactor = (fromMatchCode) ? matchCodeData["match_factor"] : matchFactorInput.val()/100;
				let numberOfItems = (matchCodeData !== null) ? matchCodeData["item_variants"].length : numberOfItemsInput.val();
				let allowAlternatives = (fromMatchCode) ? matchCodeData["allow_alternative"] : allowAlternativesInput.prop("checked");
				let allowDuplicates = (fromMatchCode) ? matchCodeData["allow_repeats"] : allowDuplicatesInput.prop("checked");
				let allowMultiMatch = (fromMatchCode) ? matchCodeData["allow_multimatch"] : allowMultiMatchInput.prop("checked");
				let predefinedItems = (matchCodeData !== null) ? matchCodeData["item_variants"] : [];
				
				startNewGame(numberOfItems, allowAlternatives, allowDuplicates, allowMultiMatch, matchFactor, predefinedItems);
			}).click();
		});
		</script>
	</head>
	<body>
		<a id="change-log-link" "target"="_blank" href="change-log.html">Change Log</a>
		<div>
			<div id="new-game-container">
				<label for="match-factor">Name Match Factor (<span id="match-factor-val"></span>)</label>
				<input id="match-factor" name="match-factor" type="range" min="0" max="100" value="80"></input>
				<label for="number-of-items">Number of Items</label>
				<input id="number-of-items" name="number-of-items" type="text" value="28"></input>
				<label for="allow-alternatives">Allow Alternatives</label>
				<input id="allow-alternatives" name="allow-alternatives" type="checkbox" checked="checked"></input>
				<label for="allow-duplicates">Allow Duplicates</label>
				<input id="allow-duplicates" name="allow-duplicates" type="checkbox"></input>
				<label for="allow-multi-match">Allow Multi-Match</label>
				<input id="allow-multi-match" name="allow-multi-match" type="checkbox"></input>
				<label for="match-code-field">Game Code</label>
				<input id="match-code-field" name="match-code-field" type="text"></input>
				<label for="use-custom-settings">Use Custom Settings with Game Code</label>
				<input id="use-custom-settings" name="use-custom-settings" type="checkbox"></input>
				<button id="new-game-button" name="new-game-button" type="button">New Game</button>
			</div>
			<div id="developer-matches-container">
				<label for="developer-matches-select">Developer Games</label>
				<select id="developer-matches-select" name="developer-matches-select" size="7">
				</select>
				<button id="new-developer-match-button" type="button">Start Developer Game</button>
			</div>
			<div>
				<label for="guess">Guess</label>
				<input id="guess" type="text" name="guess"></input>
				<button id="give-up-button" type="button">Give up</button>
			</div>
			<div id="game-container">
				<div id="display-container"></div>
				<div id="answer-key"></div>
				<div id="alternatives-container"></div>
			</div>
			<div id="match-code-container">
				<h1>Game Code:</h1>
				<span></span>
			</div>
		</div>
	</body>
</html>
